    const mainCategories = ["Part 1"];
    const subCategoriesList = ["餐饮与饮食","旅游与交通","医疗与健康","租房","购物与消费","人际关系","颜色与日用品","金融"];

    let currentMainCat = "Part 1";
    let currentSubCat = "餐饮与饮食";
    let currentWords = vocabData.filter(w => w.mainCategory === currentMainCat && w.subCategory === currentSubCat);
    if (currentWords.length === 0) currentWords = vocabData.filter(w => w.mainCategory === currentMainCat);
    let currentIndex = 0;
    let difficultSet = new Set();

    const mainCategoryFlex = document.getElementById('mainCategoryFlex');
    const subCategoryFlex = document.getElementById('subCategoryFlex');
    const flipper = document.getElementById('flipper');
    const mainEn = document.getElementById('mainEn'); 
    const backEn = document.getElementById('backEn');
    const posInfo = document.getElementById('posInfo');
    const mainCh = document.getElementById('mainCh');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const speakBtn = document.getElementById('speakBtn');
    const thumbGrid = document.getElementById('thumbGrid');
    const exportBtn = document.getElementById('exportDifficultBtn');
    const quizOpen = document.getElementById('quizOpenBtn');
    const quizOverlay = document.getElementById('quizOverlay');
    const closeQuiz = document.getElementById('closeQuizBtn');
    const quizWord = document.getElementById('quizWord');
    const quizPrev = document.getElementById('quizPrevBtn');
    const quizNext = document.getElementById('quizNextBtn');
    const quizCounter = document.getElementById('quizCounter');

    flipper.addEventListener('click', () => flipper.classList.toggle('flipped'));

    function renderMainCats() {
        mainCategoryFlex.innerHTML = '';
        mainCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `chap-btn active`;
            btn.innerText = cat;
            mainCategoryFlex.appendChild(btn);
        });
    }

    function renderSubCats() {
        subCategoryFlex.innerHTML = '';
        subCategoriesList.forEach(sub => {
            const btn = document.createElement('button');
            btn.className = `sub-btn ${sub === currentSubCat ? 'active-sub' : ''}`;
            btn.innerText = sub;
            btn.dataset.sub = sub;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active-sub'));
                btn.classList.add('active-sub');
                currentSubCat = sub;
                updateWordListAndDisplay();
            });
            const cnt = vocabData.filter(w => w.mainCategory === currentMainCat && w.subCategory === sub).length;
            const span = document.createElement('span');
            span.className = 'word-count-badge';
            span.innerText = cnt;
            btn.appendChild(span);
            subCategoryFlex.appendChild(btn);
        });
    }

    function updateWordListAndDisplay() {
        let filtered = vocabData.filter(w => w.mainCategory === currentMainCat && w.subCategory === currentSubCat);
        currentWords = filtered;
        currentIndex = currentWords.length > 0 ? 0 : -1;
        refreshMainCard();
        renderThumbnails();
    }

    function refreshMainCard() {
        if (currentWords.length === 0 || currentIndex < 0) {
            mainEn.innerText = '无'; backEn.innerText = ''; posInfo.innerText = ''; mainCh.innerText = ''; return;
        }
        const w = currentWords[currentIndex];
        mainEn.innerText = w.en;
        backEn.innerText = w.en;
        posInfo.innerText = w.pos || '';
        mainCh.innerText = w.ch;
        flipper.classList.remove('flipped');
        speakWord(w.en);
    }

    function speakWord(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    }

    function renderThumbnails() {
        thumbGrid.innerHTML = '';
        currentWords.forEach((w, idx) => {
            const key = `${w.en}|${w.ch}`;
            const card = document.createElement('div');
            card.className = 'thumb-item';
            card.innerHTML = `<input type="checkbox" class="diff-check" data-key="${key}" ${difficultSet.has(key) ? 'checked' : ''}><label>${w.en}</label>`;
            card.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') { currentIndex = idx; refreshMainCard(); }
            });
            const chk = card.querySelector('.diff-check');
            chk.addEventListener('change', (e) => {
                e.stopPropagation();
                const k = e.target.dataset.key;
                e.target.checked ? difficultSet.add(k) : difficultSet.delete(k);
            });
            thumbGrid.appendChild(card);
        });
    }

    function exportDifficult() {
        const selected = vocabData.filter(v => difficultSet.has(`${v.en}|${v.ch}`));
        if (!selected.length) { alert('没有勾选难词'); return; }
        let csv = "英文,词性,中文含义\n";
        selected.forEach(w => csv += `"${w.en}","${w.pos || ''}","${w.ch}"\n`);
        const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ielts_listening_difficult_words.csv";
        link.click();
    }

    let quizList = [], quizIdx = 0;
    function openQuiz() {
        if (!currentWords.length) return;
        const shuffled = [...currentWords].sort(()=>Math.random()-0.5);
        quizList = shuffled.slice(0, Math.min(20, currentWords.length));
        quizIdx = 0; updateQuizDisplay(); quizOverlay.classList.add('show');
    }
    function updateQuizDisplay() { if(quizList.length){ quizWord.innerText = quizList[quizIdx].en; quizCounter.innerText = `${quizIdx+1}/${quizList.length}`; } }
    function closeQuizFn() { quizOverlay.classList.remove('show'); }

    prevBtn.addEventListener('click', ()=>{
        if(!currentWords.length) return;
        currentIndex = (currentIndex-1+currentWords.length)%currentWords.length; refreshMainCard();
    });
    nextBtn.addEventListener('click', ()=>{
        if(!currentWords.length) return;
        currentIndex = (currentIndex+1)%currentWords.length; refreshMainCard();
    });
    speakBtn.addEventListener('click', ()=>{
        if(currentWords[currentIndex]) speakWord(currentWords[currentIndex].en);
    });
    exportBtn.addEventListener('click', exportDifficult);
    quizOpen.addEventListener('click', openQuiz);
    closeQuiz.addEventListener('click', closeQuizFn);
    quizPrev.addEventListener('click', ()=>{ if(quizList.length){ quizIdx = (quizIdx-1+quizList.length)%quizList.length; updateQuizDisplay(); } });
    quizNext.addEventListener('click', ()=>{ if(quizList.length){ quizIdx = (quizIdx+1)%quizList.length; updateQuizDisplay(); } });
    quizOverlay.addEventListener('click', (e)=>{ if(e.target===quizOverlay) closeQuizFn(); });

    renderMainCats(); renderSubCats();
    setTimeout(()=>{ const f=document.querySelector('.sub-btn'); if(f) f.classList.add('active-sub'); },20);
    updateWordListAndDisplay();
})();
